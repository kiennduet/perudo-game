        const diceIcons = ['','⚀','⚁','⚂','⚃','⚄','⚅'];

        let currentBidFace = 2;

            const p = document.getElementById('pass').value.trim();
            if (u && p) socket.emit('login', { username: u, password: p });

        socket.on('loginSuccess', (n) => { myName = n; document.getElementById('login-box').style.display = 'none'; document.getElementById('game-box').style.display = 'block'; });

        socket.on('reloadAll', () => location.reload());

        function changeCount(v) { currentBidCount = Math.max(1, currentBidCount + v); updateBidUI(); }
        function selectFace(f) { currentBidFace = f; updateBidUI(); }

            document.getElementById('bid-count-val').innerText = currentBidCount;

            btns.forEach((b, i) => b.style.background = (i+1 === currentBidFace) ? 'var(--p)' : '#334155');
            btns.forEach((b, i) => b.style.color = (i+1 === currentBidFace) ? 'white' : '#94a3b8');

            myDiceEl.style.fontSize = game.active ? "50px" : "22px";

            // Hiển thị UI tương ứng
            const isShowdown = game.active && game.showingResults;
            const isPlaying = game.active && !game.showingResults;
            
            document.getElementById('ready-ui').style.display = (!game.active || isShowdown) ? 'block' : 'none';
            document.getElementById('actions-ui').style.display = (isPlaying) ? 'block' : 'none';
            
            // Cập nhật nút Ready
            const readyBtn = document.getElementById('readyBtn');
            readyBtn.innerText = meObj?.ready ? "WAITING FOR OTHERS..." : (isShowdown ? "READY FOR NEXT ROUND" : "READY TO PLAY");
            readyBtn.className = "btn-main " + (meObj?.ready ? "btn-unready" : "btn-ready");

            if (!game.active) {
                document.getElementById('mode-selectors').innerHTML = allModes.map(m => `
                    <button class="mode-btn ${game.mode === m ? 'mode-active' : ''}" onclick="socket.emit('changeMode', '${m}')">${m}</button>
                `).join('');
                document.getElementById('mode-desc').innerText = currentModeInfo.desc;
            } else {
                const isTurn = isPlaying && players[game.turn]?.name === myName;
                document.getElementById('currentBid').innerText = game.bid.count > 0 ? `${game.bid.count} × ${diceIcons[game.bid.face]}` : "OPEN BIDDING";
                
                // Gợi ý thầu
                if (isTurn && (currentBidCount <= game.bid.count)) {
                    currentBidCount = game.bid.count + (game.bid.face === 6 ? 1 : 0);
                    currentBidFace = game.bid.face === 6 ? 2 : game.bid.face + 1;
                    updateBidUI();
                }

                document.getElementById('status').innerText = isShowdown ? "🔍 SHOWDOWN" : (isTurn ? "🔥 YOUR TURN" : `WAITING FOR ${players[game.turn]?.name}...`);
                document.getElementById('status').style.color = isTurn ? "var(--s)" : "var(--t-mute)";
            }

            document.getElementById('playerList').innerHTML = players.map((p, i) => `
                <div class="player-row ${game.turn === i && game.active && !game.showingResults ? 'p-turn' : ''} ${!p.online ? 'offline' : ''}">
                    <div class="p-name">
                        <span>${p.online ? '🟢' : '⚪'} ${p.name} ${p.ready ? '<span class="ready-badge">✓</span>' : ''}</span>
                    </div>
                    <span style="font-size:18px; color:#fbbf24">
                        ${!game.active ? '🎲×5' : (p.alive ? (game.showingResults ? `<span class="dice-reveal">${p.dice.map(d => diceIcons[d]).join('')}</span>` : '🎲'.repeat(p.count)) : 'OUT')}
                    </span>
                </div>
            `).join('');

        });
        updateBidUI();

<!DOCTYPE html>
<html lang="en">
<head>

        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        button { border: none; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-main { padding: 16px; border-radius: 16px; width: 100%; font-size: 16px; text-transform: uppercase; }
        .btn-p { background: var(--p); color: white; }
        .btn-ready { background: var(--s); color: white; }
        .btn-unready { background: #475569; color: white; }
        .btn-bid { background: var(--s); color: white; }
        .btn-liar { background: var(--d); color: white; }
        
        /* LOGS */
        #logs { font-size: 12px; color: var(--t-mute); height: 130px; overflow-y: auto; border-top: 1px solid #334155; padding-top: 10px; margin-top: 10px; }
        .log-entry { margin-bottom: 4px; border-left: 2px solid #334155; padding-left: 8px; }
        .log-win { color: var(--s); font-weight: bold; border-left-color: var(--s); }
        .log-loss { color: var(--d); }
        .offline { opacity: 0.3; filter: grayscale(1); }
    </style>
</head>

                        <button style="width:50px; height:50px; border-radius:50%; background:#334155; color:white; font-size:24px" onclick="changeCount(1)">+</button>
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-bottom: 15px;" id="face-btns">

                        <button class="face-btn" onclick="selectFace(2)" style="padding:10px 0; background:#334155; border-radius:10px; font-size:20px; color:#94a3b8;">⚁</button>

                        <button class="face-btn" onclick="selectFace(6)" style="padding:10px 0; background:#334155; border-radius:10px; font-size:20px; color:#94a3b8;">⚅</button>
                    </div>
                    <button class="btn-main btn-bid" onclick="confirmBid()" style="margin-bottom: 10px;">PLACE BID</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const diceIcons = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
        let myName = "";
        let currentBidCount = 1;
        let currentBidFace = 2;

        function login() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            if (u && p) socket.emit('login', { username: u, password: p });
        }

        socket.on('loginSuccess', (n) => { myName = n; document.getElementById('login-box').style.display = 'none'; document.getElementById('game-box').style.display = 'block'; });
        socket.on('err', (m) => alert(m));
        socket.on('reloadAll', () => location.reload());

        function changeCount(v) { currentBidCount = Math.max(1, currentBidCount + v); updateBidUI(); }
        function selectFace(f) { currentBidFace = f; updateBidUI(); }
        function updateBidUI() {
            document.getElementById('bid-count-val').innerText = currentBidCount;
            const btns = document.querySelectorAll('.face-btn');
            btns.forEach((b, i) => b.style.background = (i+1 === currentBidFace) ? 'var(--p)' : '#334155');
            btns.forEach((b, i) => b.style.color = (i+1 === currentBidFace) ? 'white' : '#94a3b8');
        }
        function confirmBid() { socket.emit('bid', { count: currentBidCount, face: currentBidFace }); }

        socket.on('update', ({ players, game, allModes, currentModeInfo }) => {
            const meObj = players.find(p => p.name === myName);
            const myDiceEl = document.getElementById('myDice');
            
            myDiceEl.innerText = game.active ? (meObj?.alive ? meObj.dice.map(d => diceIcons[d]).join(' ') : "ELIMINATED") : "LOBBY";
            myDiceEl.style.fontSize = game.active ? "50px" : "22px";

            const isShowdown = game.active && game.showingResults;
            const isPlaying = game.active && !game.showingResults;
            
            document.getElementById('ready-ui').style.display = (!game.active || isShowdown) ? 'block' : 'none';
            document.getElementById('actions-ui').style.display = (isPlaying) ? 'block' : 'none';
            
            const readyBtn = document.getElementById('readyBtn');
            readyBtn.innerText = meObj?.ready ? "WAITING..." : (isShowdown ? "READY FOR NEXT" : "READY TO PLAY");
            readyBtn.className = "btn-main " + (meObj?.ready ? "btn-unready" : "btn-ready");

            if (!game.active) {
                document.getElementById('mode-selectors').innerHTML = allModes.map(m => `
                    <button style="background:${game.mode===m?'var(--p)':'#334155'}; color:white; padding:8px 12px; margin:2px; border-radius:8px; font-size:11px" onclick="socket.emit('changeMode', '${m}')">${m}</button>
                `).join('');
            } else {
                const isTurn = isPlaying && players[game.turn]?.name === myName;
                document.getElementById('currentBid').innerText = game.bid.count > 0 ? `${game.bid.count} × ${diceIcons[game.bid.face]}` : "OPENING...";

                    currentBidCount = game.bid.count + (game.bid.face === 6 ? 1 : 0);
                    currentBidFace = game.bid.face === 6 ? 2 : game.bid.face + 1;
                    updateBidUI();
                    if (window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
                }

                document.getElementById('status').innerText = isShowdown ? "🔍 SHOWDOWN" : (isTurn ? "🔥 YOUR TURN" : `WAITING FOR ${players[game.turn]?.name}...`);

            document.getElementById('playerList').innerHTML = players.map((p, i) => `

            document.getElementById('logs').innerHTML = game.logs.slice().reverse().map(l => {
                let cls = "log-entry";
                if (l.includes("Wins the challenge")) cls += " log-win";
                if (l.includes("lost 1 die") || l.includes("ELIMINATED")) cls += " log-loss";
                return `<div class="${cls}">${l}</div>`;
            }).join('');
        });
        updateBidUI();
    </script>
