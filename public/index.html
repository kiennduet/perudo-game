    <script>
        const socket = io();
        const diceIcons = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
        let myName = "";
        let currentBidCount = 1;
        let currentBidFace = 2;

        // Tự động điền login
        if (localStorage.getItem('p_user')) {
            document.getElementById('user').value = localStorage.getItem('p_user');
            document.getElementById('pass').value = localStorage.getItem('p_pass');
        }

        function login() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            if (u && p) {
                localStorage.setItem('p_user', u); localStorage.setItem('p_pass', p);
                socket.emit('login', { username: u, password: p });
            }
        }

        socket.on('loginSuccess', (n) => {
            myName = n;
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('game-box').style.display = 'block';
        });

        socket.on('err', (m) => alert(m));
        socket.on('reloadAll', () => { localStorage.clear(); location.reload(); });

        // Logic điều khiển Thầu (UX nâng cao)
        function changeCount(val) {
            currentBidCount = Math.max(1, currentBidCount + val);
            updateBidDisplay();
        }

        function selectFace(f) {
            currentBidFace = f;
            updateBidDisplay();
        }

        function updateBidDisplay() {
            document.getElementById('bid-count-val').innerText = currentBidCount;
            document.querySelectorAll('.face-btn').forEach((btn, idx) => {
                btn.classList.toggle('selected', (idx + 1) === currentBidFace);
            });
        }

        function confirmBid() {
            socket.emit('bid', { count: currentBidCount, face: currentBidFace });
        }

            const myDiceEl = document.getElementById('myDice');
            
            // Xúc xắc bản thân
            myDiceEl.innerText = game.active ? (meObj?.alive ? meObj.dice.map(d => diceIcons[d]).join(' ') : "ĐÃ BỊ LOẠI") : "PHÒNG CHỜ";

            document.getElementById('result-ui').style.display = (game.active && game.showingResults) ? 'block' : 'none';

                // Lobby UI

                    <button class="mode-btn ${game.mode === m ? 'mode-active' : ''}"

                `).join('');

                document.getElementById('startBtn').style.display = players.length >= 2 ? 'block' : 'none';
            } else {
                // Gameplay UI
                const isTurn = !game.showingResults && players[game.turn]?.name === myName;
                document.getElementById('currentBid').innerText = game.bid.count > 0 ? 
                    `${game.bid.count} × ${diceIcons[game.bid.face]}` : "MỞ BÁT";
                
                // Tự động gợi ý mức thầu tiếp theo nếu đến lượt
                if (isTurn && (currentBidCount <= game.bid.count)) {
                    currentBidCount = game.bid.count + (game.bid.face === 6 ? 1 : 0);
                    currentBidFace = game.bid.face === 6 ? 2 : game.bid.face + 1;
                    updateBidDisplay();
                    // Rung điện thoại báo hiệu đến lượt
                    if (window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
                }

                // Chặn/Mở nút thầu
                document.getElementById('actions-ui').style.pointerEvents = isTurn ? 'auto' : 'none';
                document.getElementById('actions-ui').style.opacity = isTurn ? '1' : '0.4';

                statusEl.className = isTurn ? "waiting-anim" : "";
                statusEl.style.color = isTurn ? "var(--s)" : "var(--t-mute)";
            }

            // Danh sách người chơi
            document.getElementById('playerList').innerHTML = players.map((p, i) => `
                <div class="player-row ${game.turn === i && game.active ? 'p-turn' : ''} ${!p.online ? 'offline' : ''}">
                    <div class="p-name">
                        ${!game.active ? `<div style="display:flex;flex-direction:column"><button style="padding:2px;font-size:8px" onclick="socket.emit('movePlayer',{index:${i},direction:-1})">▲</button><button style="padding:2px;font-size:8px" onclick="socket.emit('movePlayer',{index:${i},direction:1})">▼</button></div>` : ''}
                        <span>${p.online ? '🟢' : '⚪'} ${p.name}</span>
                    </div>
                    <span class="p-dice">
                        ${!game.active ? '🎲×5' : (p.alive ? (game.showingResults ? p.dice.map(d => diceIcons[d]).join('') : '🎲'.repeat(p.count)) : 'OUT')}
                    </span>
                </div>
            `).join('');

            // Logs
            const logEl = document.getElementById('logs');
            logEl.innerHTML = game.logs.slice().reverse().map(l => `<div style="margin-bottom:4px; border-left: 2px solid #334155; padding-left: 8px;">${l}</div>`).join('');
        });
        
        updateBidDisplay();
    </script>
</body>

                    if (window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
                }
                
                const statusEl = document.getElementById('status');
                statusEl.innerText = game.showingResults ? "🔍 KẾT QUẢ HẠ BÀI" : (isTurn ? "ĐẾN LƯỢT BẠN" : `ĐỢI ${players[game.turn]?.name}...`);
                statusEl.className = isTurn ? "waiting-anim" : "";
                statusEl.style.color = isTurn ? "var(--s)" : "var(--t-mute)";
            }

            document.getElementById('playerList').innerHTML = players.map((p, i) => `
                <div class="player-row ${game.turn === i && game.active ? 'p-turn' : ''} ${!p.online ? 'offline' : ''}">
                    <div class="p-name">
                        ${!game.active ? `<div style="display:flex;flex-direction:column"><button style="padding:2px;font-size:8px" onclick="socket.emit('movePlayer',{index:${i},direction:-1})">▲</button><button style="padding:2px;font-size:8px" onclick="socket.emit('movePlayer',{index:${i},direction:1})">▼</button></div>` : ''}
                        <span>${p.online ? '🟢' : '⚪'} ${p.name}</span>
                    </div>
                    <span class="p-dice">
                        ${!game.active ? '🎲×5' : (p.alive ? (game.showingResults ? `<span class="dice-reveal">${p.dice.map(d => diceIcons[d]).join('')}</span>` : '🎲'.repeat(p.count)) : 'OUT')}
                    </span>
                </div>
            `).join('');

            document.getElementById('logs').innerHTML = game.logs.slice().reverse().map(l => `<div style="margin-bottom:4px; border-left: 2px solid #334155; padding-left: 8px;">${l}</div>`).join('');
        });
        
        updateBidDisplay();
    </script>
</body>
</html>
