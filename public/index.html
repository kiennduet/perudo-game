<!DOCTYPE html>
<html lang="en">
<head>
    <title>🎲 Perudo Pro</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --p:#3b82f6; --s:#10b981; --d:#ef4444; --w:#fbbf24;
            --bg:#0f172a; --c:#1e293b; --t:#f8fafc; --t-mute:#94a3b8;
        }
        *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body{ font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--t); margin:0; padding:10px 10px 90px; display:flex; flex-direction:column; align-items:center; overflow-x:hidden; }

        .container{ width:100%; max-width:480px; }
        .card{ background:var(--c); padding:18px; border-radius:24px; margin-bottom:12px; box-shadow:0 10px 25px rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.05); position:relative; overflow:hidden; }

        @keyframes shake{ 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
        .shake-effect{ animation:shake 0.5s ease-in-out; }
        .flash-red-active{ background-color:rgba(239,68,68,0.4) !important; }

        /* ── Color picker ── */
        .color-swatch{ width:34px; height:34px; border-radius:50%; border:3px solid transparent; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; justify-content:center; font-size:14px; color:white; font-weight:900; }
        .color-swatch.selected{ border-color:white; transform:scale(1.15); }
        .color-swatch:hover{ transform:scale(1.1); }

        /* ── Die cards ── */
        .dice-tray{ display:flex; gap:7px; justify-content:center; flex-wrap:wrap; min-height:64px; align-items:center; margin:12px 0 8px; }
        .die-card{ width:52px; height:52px; background:rgba(255,255,255,0.05); border:2px solid rgba(255,255,255,0.1); border-radius:12px; display:inline-flex; align-items:center; justify-content:center; font-size:30px; line-height:1; transition:transform 0.1s, border-color 0.3s; flex-shrink:0; }
        @keyframes dieRoll{ 0%{transform:scale(1) rotate(-12deg)} 25%{transform:scale(1.12) rotate(9deg)} 50%{transform:scale(0.9) rotate(-8deg)} 75%{transform:scale(1.08) rotate(6deg)} 100%{transform:scale(1) rotate(-12deg)} }
        @keyframes dieSettle{ 0%{transform:scale(1.35) rotate(8deg)} 40%{transform:scale(0.88) rotate(-4deg)} 70%{transform:scale(1.06) rotate(2deg)} 100%{transform:scale(1) rotate(0)} }
        @keyframes dieFlipIn{ 0%{transform:rotateY(90deg) scale(0.8);opacity:0} 100%{transform:rotateY(0) scale(1);opacity:1} }
        .die-card.rolling{ animation:dieRoll 0.13s ease-in-out infinite; }
        .die-card.settling{ animation:dieSettle 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards; }
        .die-card.flip-in{ animation:dieFlipIn 0.3s ease both; }
        .die-reveal{ display:inline-block; font-size:28px; animation:dieFlipIn 0.3s ease both; }

        /* ── Player rows ── */
        .player-row{ display:flex; align-items:center; padding:12px 14px; border-radius:16px; margin-bottom:8px; background:rgba(255,255,255,0.02); border:2px solid transparent; transition:all 0.4s cubic-bezier(0.4,0,0.2,1); opacity:0.5; position:relative; overflow:hidden; }
        .p-turn{ opacity:1 !important; background:rgba(59,130,246,0.1); border-color:var(--p); box-shadow:0 0 20px rgba(59,130,246,0.4); transform:scale(1.04); z-index:10; animation:turnPulse 2s infinite; }
        @keyframes turnPulse{ 0%{border-color:var(--p);box-shadow:0 0 5px var(--p)} 50%{border-color:#60a5fa;box-shadow:0 0 20px var(--p)} 100%{border-color:var(--p);box-shadow:0 0 5px var(--p)} }
        .your-turn-active{ border:2px solid var(--s) !important; box-shadow:0 0 30px rgba(16,185,129,0.2) !important; }
        .p-winner{ opacity:1 !important; border-color:var(--w); background:rgba(251,191,36,0.15); box-shadow:0 0 25px var(--w); transform:scale(1.05); }
        .p-loser { opacity:1 !important; border-color:var(--d); background:rgba(239,68,68,0.15); }
        .offline { filter:grayscale(1); opacity:0.2 !important; }

        /* ── Avatar ── */
        .p-avatar{ width:32px; height:32px; border-radius:50%; flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; font-size:13px; font-weight:900; color:rgba(255,255,255,0.95); text-shadow:0 1px 3px rgba(0,0,0,0.5); margin-right:8px; }
        .p-color-bar{ position:absolute; left:0; top:8px; bottom:8px; width:3px; border-radius:0 3px 3px 0; opacity:0.75; }

        /* ── Buttons ── */
        button{ border:none; font-weight:800; cursor:pointer; transition:0.2s; }
        .btn-main{ padding:16px; border-radius:16px; width:100%; font-size:16px; text-transform:uppercase; }
        .btn-p{ background:var(--p); color:white; }
        .btn-s{ background:var(--s); color:white; }
        .btn-d{ background:var(--d); color:white; }
        .reorder-btn{ background:#334155; color:rgb(14,229,129); border-radius:3.5px; padding:2px 6px; font-size:10px; margin:1px; display:block; }
        .reorder-btn:hover{ background:var(--p); }
        .kick-btn{ background:rgba(239,68,68,0.15); color:var(--d); border:1px solid rgba(239,68,68,0.3); border-radius:8px; padding:3px 8px; font-size:10px; font-weight:700; margin-left:4px; cursor:pointer; transition:all 0.2s; }
        .kick-btn:hover{ background:var(--d); color:white; }
        .ready-badge{ color:var(--s); font-weight:bold; font-size:18px; }

        /* ── Sound toggle ── */
        #sound-btn{ position:absolute; top:14px; right:14px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:5px 9px; font-size:15px; color:var(--t-mute); cursor:pointer; transition:all 0.2s; }
        #sound-btn:hover{ background:rgba(255,255,255,0.12); color:var(--t); }
        #sound-btn.muted{ opacity:0.45; }

        /* ── Palifico banner ── */
        #palifico-banner{
            display:none;
            background:rgba(251,191,36,0.1);
            border:1.5px solid rgba(251,191,36,0.5);
            border-radius:14px;
            padding:10px 14px;
            margin-bottom:14px;
            text-align:center;
        }
        #palifico-banner.show{ display:block; animation:palificoIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
        @keyframes palificoIn{ from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
        .palifico-title{ font-size:16px; font-weight:900; color:var(--w); letter-spacing:1px; }
        .palifico-sub{ font-size:11px; color:#fcd34d; margin-top:3px; opacity:0.85; }

        /* ── Face buttons locked state ── */
        .face-btn:disabled{ opacity:0.25; cursor:not-allowed; transform:none !important; }
        .face-btn.face-locked{ border:2px solid var(--w) !important; box-shadow:0 0 10px rgba(251,191,36,0.4); }

        /* ── Logs ── */
        #logs{ font-size:12px; color:var(--t-mute); height:120px; overflow-y:auto; border-top:1px solid #334155; padding-top:10px; margin-top:10px; }

        /* ── Countdown ── */
        #countdown-wrap{ margin-top:10px; display:none; }
        #countdown-bar-bg{ background:#1e293b; border-radius:99px; height:6px; overflow:hidden; }
        #countdown-bar{ height:100%; border-radius:99px; background:var(--w); transition:width 0.1s linear; }
        #countdown-label{ font-size:11px; color:var(--t-mute); text-align:center; margin-top:4px; }

        /* ── Winner overlay ── */
        #winner-overlay{ display:none; position:fixed; inset:0; z-index:200; background:rgba(10,15,30,0.92); backdrop-filter:blur(8px); flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
        #winner-overlay.show{ display:flex; animation:fadeInScale 0.5s cubic-bezier(0.34,1.56,0.64,1); }
        @keyframes fadeInScale{ from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }
        #winner-crown{ font-size:80px; margin-bottom:10px; animation:crownBounce 0.8s 0.3s both; }
        @keyframes crownBounce{ 0%{transform:translateY(-40px);opacity:0} 60%{transform:translateY(10px)} 100%{transform:translateY(0);opacity:1} }
        #winner-name{ font-size:38px; font-weight:900; color:var(--w); text-shadow:0 0 30px var(--w); letter-spacing:2px; }
        #winner-sub{ font-size:15px; color:var(--t-mute); margin-top:8px; }
        #winner-bar-wrap{ width:200px; margin-top:24px; }
        #winner-bar-bg{ background:#1e293b; border-radius:99px; height:5px; overflow:hidden; }
        #winner-bar{ height:100%; background:var(--w); border-radius:99px; width:100%; transition:width 0.1s linear; }

        /* ── Chat FAB + Panel ── */
        #chat-fab{ position:fixed; bottom:18px; right:18px; z-index:150; width:52px; height:52px; border-radius:50%; background:var(--p); color:white; font-size:22px; box-shadow:0 4px 20px rgba(59,130,246,0.5); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:0.2s; border:none; }
        #chat-fab:hover{ background:#2563eb; transform:scale(1.08); }
        #chat-fab:active{ transform:scale(0.94); }
        #chat-unread-badge{ position:absolute; top:-3px; right:-3px; background:var(--d); color:white; border-radius:50%; width:18px; height:18px; font-size:10px; font-weight:900; display:none; align-items:center; justify-content:center; }
        #chat-panel{ position:fixed; bottom:82px; right:12px; z-index:149; background:#1e293b; border:1px solid rgba(255,255,255,0.08); border-radius:20px; padding:14px; box-shadow:0 12px 40px rgba(0,0,0,0.5); width:min(300px,calc(100vw - 24px)); display:none; flex-direction:column; gap:10px; animation:slideUp 0.2s ease; }
        #chat-panel.open{ display:flex; }
        @keyframes slideUp{ from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        #chat-panel-title{ font-size:11px; color:var(--t-mute); text-transform:uppercase; letter-spacing:1px; font-weight:700; margin-bottom:2px; }
        .phrase-grid{ display:grid; grid-template-columns:1fr 1fr; gap:6px; }
        .phrase-btn{ background:rgba(255,255,255,0.05); color:var(--t); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:9px 6px; font-size:13px; font-weight:600; cursor:pointer; transition:0.15s; text-align:left; }
        .phrase-btn:hover{ background:var(--p); border-color:var(--p); }
        .phrase-btn:active{ transform:scale(0.96); }

        /* ── Toast ── */
        #toast-area{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:300; pointer-events:none; display:flex; flex-direction:column; align-items:center; gap:8px; width:min(300px,85vw); }
        .chat-toast{ background:rgba(15,23,42,0.92); backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:10px 18px; text-align:center; max-width:100%; animation:toastIn 0.25s ease, toastOut 0.4s ease 2.6s forwards; }
        .chat-toast.system-toast{ border-color:rgba(251,191,36,0.3); }
        @keyframes toastIn { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }
        @keyframes toastOut{ from{opacity:1;transform:scale(1)} to{opacity:0;transform:scale(0.85)} }
        .toast-sender{ font-size:11px; font-weight:700; display:block; margin-bottom:2px; }
        .toast-text{ font-size:14px; color:var(--t); }
        .system-toast .toast-text{ color:var(--w); font-size:12px; }
    </style>
</head>
<body>
<div class="container" id="main-ui">

    <!-- ── LOGIN ── -->
    <div id="login-box" class="card" style="text-align:center;">
        <h1 style="color:var(--p);margin-bottom:4px;">🎲 PERUDO PRO</h1>
        <div style="font-size:11px;color:var(--t-mute);margin-bottom:20px;letter-spacing:1px;text-transform:uppercase;font-weight:600;opacity:0.8;">
            v1.5.0 • Developed by <span style="color:var(--s);">MarcusB</span>
        </div>
        <div style="margin-bottom:18px;">
            <div style="font-size:12px;color:var(--t-mute);margin-bottom:10px;letter-spacing:.5px;">CHOOSE YOUR COLOR</div>
            <div id="color-picker" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;"></div>
        </div>
        <input type="text" id="user" placeholder="Username"
            style="width:100%;padding:14px;border-radius:12px;border:1px solid #334155;background:#0f172a;color:white;margin-bottom:10px;">
        <input type="password" id="pass" placeholder="Password"
            style="width:100%;padding:14px;border-radius:12px;border:1px solid #334155;background:#0f172a;color:white;margin-bottom:15px;">
        <button class="btn-main btn-p" onclick="login()">LOGIN</button>
    </div>

    <!-- ── GAME ── -->
    <div id="game-box" style="display:none;">

        <!-- Status card -->
        <div id="status-card" class="card" style="text-align:center;background:radial-gradient(circle at top,#1e293b,#0f172a);">
            <button id="sound-btn" onclick="toggleSound()" title="Toggle sound">🔊</button>
            <div id="status" style="font-weight:800;margin-bottom:4px;letter-spacing:1px;"></div>
            <div id="myDice-tray" class="dice-tray"></div>
            <h1 id="currentBid" style="margin:5px 0;font-size:44px;color:var(--p);text-shadow:0 0 10px rgba(59,130,246,0.3);">---</h1>
            <div id="countdown-wrap">
                <div id="countdown-bar-bg"><div id="countdown-bar" style="width:100%"></div></div>
                <div id="countdown-label"></div>
            </div>
        </div>

        <!-- Action card -->
        <div id="action-card" class="card">
            <div id="ready-ui" style="text-align:center;">
                <div id="mode-selectors" style="display:flex;flex-wrap:wrap;justify-content:center;margin-bottom:10px;"></div>
                <p id="mode-desc" style="font-size:12px;color:var(--t-mute);margin-bottom:20px;"></p>
                <button id="readyBtn" class="btn-main" onclick="socket.emit('toggleReady')">READY</button>
            </div>
            <div id="actions-ui" style="display:none;">

                <!-- ── Palifico banner (shown only during palifico round) ── -->
                <div id="palifico-banner">
                    <div class="palifico-title">🎯 PALIFICO ROUND</div>
                    <div class="palifico-sub" id="palifico-sub">Opening bid sets the face — everyone must raise count only</div>
                </div>

                <div style="display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:20px;">
                    <button style="width:55px;height:55px;border-radius:50%;background:#334155;color:white;font-size:28px" onclick="changeCount(-1)">−</button>
                    <div id="bid-count-val" style="font-size:38px;font-weight:900;min-width:60px;text-align:center;">1</div>
                    <button style="width:55px;height:55px;border-radius:50%;background:#334155;color:white;font-size:28px" onclick="changeCount(1)">+</button>
                </div>
                <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:20px;" id="face-btns">
                    <button class="face-btn" onclick="selectFace(1)" style="padding:12px 0;background:#334155;border-radius:12px;font-size:24px;color:#94a3b8;">⚀</button>
                    <button class="face-btn" onclick="selectFace(2)" style="padding:12px 0;background:#334155;border-radius:12px;font-size:24px;color:#94a3b8;">⚁</button>
                    <button class="face-btn" onclick="selectFace(3)" style="padding:12px 0;background:#334155;border-radius:12px;font-size:24px;color:#94a3b8;">⚂</button>
                    <button class="face-btn" onclick="selectFace(4)" style="padding:12px 0;background:#334155;border-radius:12px;font-size:24px;color:#94a3b8;">⚃</button>
                    <button class="face-btn" onclick="selectFace(5)" style="padding:12px 0;background:#334155;border-radius:12px;font-size:24px;color:#94a3b8;">⚄</button>
                    <button class="face-btn" onclick="selectFace(6)" style="padding:12px 0;background:#334155;border-radius:12px;font-size:24px;color:#94a3b8;">⚅</button>
                </div>
                <button class="btn-main btn-s" onclick="confirmBid()" style="margin-bottom:12px;font-size:18px;">PLACE BID</button>
                <button class="btn-main btn-d" onclick="callLiar()">CALL LIAR!</button>
            </div>
        </div>

        <div id="playerList" style="margin-top:5px;"></div>
        <div class="card" id="logs"></div>
        <button onclick="confirm('Reset Server?')&&socket.emit('resetRoom')"
            style="background:none;color:var(--t-mute);font-size:10px;width:100%;opacity:0.5;margin-top:10px;">
            SERVER RESET
        </button>
    </div>
</div>

<!-- ── WINNER OVERLAY ── -->
<div id="winner-overlay">
    <div id="winner-crown">👑</div>
    <div id="winner-name">---</div>
    <div id="winner-sub">CHAMPION OF THIS ROUND!</div>
    <div id="winner-bar-wrap">
        <div id="winner-bar-bg"><div id="winner-bar"></div></div>
        <div style="font-size:11px;color:var(--t-mute);text-align:center;margin-top:6px;">Returning to lobby…</div>
    </div>
</div>

<div id="toast-area"></div>

<button id="chat-fab" onclick="toggleChatPanel()">
    💬<span id="chat-unread-badge">0</span>
</button>
<div id="chat-panel">
    <div id="chat-panel-title">Quick Chat</div>
    <div class="phrase-grid" id="phrase-grid"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* ════════════════════════════════════════════════════════
   CONSTANTS
════════════════════════════════════════════════════════ */
const diceIcons = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
const PLAYER_COLORS = ['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#3b82f6','#8b5cf6','#ec4899'];
const PHRASES = [
    '🎲 Good roll!','🤨 I don\'t believe you',
    '😂 LOL','👏 GG',
    '🔥 Let\'s go!','😬 Oof…',
    '😈 Trust me','🎭 I never lie',
    '💀 RIP','🙏 Mercy!',
    '🤔 Hmm…','😤 NO WAY'
];

/* ════════════════════════════════════════════════════════
   SOUND ENGINE
════════════════════════════════════════════════════════ */
class Sfx {
    constructor(){ this.ac=null; this.on=true; }
    _ctx(){ if(!this.ac) this.ac=new(window.AudioContext||window.webkitAudioContext)(); if(this.ac.state==='suspended') this.ac.resume(); return this.ac; }
    _osc(freq,d,dur,type='sine',vol=0.28){ if(!this.on) return; const ac=this._ctx(),o=ac.createOscillator(),g=ac.createGain(); o.connect(g);g.connect(ac.destination); o.type=type;o.frequency.value=freq; const t=ac.currentTime+d; g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.01);g.gain.exponentialRampToValueAtTime(0.001,t+dur); o.start(t);o.stop(t+dur+0.05); }
    _noise(d,dur,vol=0.18,bf=1200){ if(!this.on) return; const ac=this._ctx(),buf=ac.createBuffer(1,Math.ceil(ac.sampleRate*dur),ac.sampleRate),data=buf.getChannelData(0); for(let i=0;i<data.length;i++) data[i]=Math.random()*2-1; const src=ac.createBufferSource();src.buffer=buf; const f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=bf;f.Q.value=0.6; const g=ac.createGain(); src.connect(f);f.connect(g);g.connect(ac.destination); const t=ac.currentTime+d; g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur); src.start(t);src.stop(t+dur+0.02); }
    roll(){ for(let i=0;i<8;i++){ this._noise(i*0.075,0.045,0.22-i*0.015,900+Math.random()*600); this._osc(180+Math.random()*350,i*0.075,0.04,'square',0.06); } }
    yourTurn(){ this._osc(659,0,0.12);this._osc(784,0.12,0.2); }
    challenge(){ this._noise(0,0.06,0.35,400);this._osc(110,0,0.1,'sawtooth',0.35);this._osc(880,0,0.06,'sine',0.18);this._osc(1320,0.05,0.1,'sine',0.12); }
    win(){ [523,659,784,1047].forEach((f,i)=>this._osc(f,i*0.1,0.15,'sine',0.22)); }
    lose(){ [392,330,262,196].forEach((f,i)=>this._osc(f,i*0.1,0.18,'sine',0.18)); }
    champion(){ [523,659,784,1047,1568].forEach((f,i)=>this._osc(f,i*0.08,0.2,'sine',0.28)); setTimeout(()=>[523,659,784,1047].forEach((f,i)=>this._osc(f,i*0.06,0.3,'triangle',0.2)),500); }
    eliminated(){ [349,330,294,220].forEach((f,i)=>this._osc(f,i*0.14,0.22,'sawtooth',0.14)); }
    // Palifico activation: ominous rising tones
    palifico(){ [220,277,330,415].forEach((f,i)=>this._osc(f,i*0.12,0.3,'triangle',0.2)); setTimeout(()=>this._osc(415,0,0.5,'sine',0.15),600); }
    click(){ this._noise(0,0.025,0.09,2000); }
}
const sfx = new Sfx();

/* ════════════════════════════════════════════════════════
   COLOR PICKER
════════════════════════════════════════════════════════ */
let selectedColor = localStorage.getItem('perudoColor') || PLAYER_COLORS[0];
let myColor = selectedColor;

function buildColorPicker(){
    document.getElementById('color-picker').innerHTML = PLAYER_COLORS.map(c => {
        const sel = c === selectedColor;
        return `<button class="color-swatch${sel?' selected':''}"
            style="background:${c};border-color:${sel?'white':'transparent'};"
            onclick="pickColor('${c}')">${sel?'✓':''}</button>`;
    }).join('');
}
function pickColor(c){ selectedColor=c; localStorage.setItem('perudoColor',c); buildColorPicker(); sfx.click(); }
buildColorPicker();

/* ════════════════════════════════════════════════════════
   DICE ANIMATION
════════════════════════════════════════════════════════ */
let diceAnimIntervals = [];

function clearDiceAnims(){ diceAnimIntervals.forEach(clearInterval); diceAnimIntervals=[]; }

function animateMyDice(finalValues, color){
    clearDiceAnims();
    const tray = document.getElementById('myDice-tray');
    tray.innerHTML = finalValues.map((_,i) =>
        `<span class="die-card rolling" id="myd-${i}" style="border-color:${color}55;">${diceIcons[1]}</span>`
    ).join('');
    finalValues.forEach((val,i) => {
        const iv = setInterval(()=>{ const el=document.getElementById(`myd-${i}`); if(el) el.textContent=diceIcons[Math.floor(Math.random()*6)+1]; },60);
        diceAnimIntervals.push(iv);
        setTimeout(()=>{
            clearInterval(iv);
            const el = document.getElementById(`myd-${i}`);
            if(el){ el.textContent=diceIcons[val]; el.classList.remove('rolling'); el.classList.add('settling'); setTimeout(()=>el&&el.classList.remove('settling'),450); }
        }, 380+i*130);
    });
}

function renderMyDice(values, color){
    clearDiceAnims();
    const tray = document.getElementById('myDice-tray');
    if(!values||values.length===0){ tray.innerHTML=`<span style="font-size:20px;color:var(--t-mute);letter-spacing:1px;">WAITING…</span>`; return; }
    tray.innerHTML = values.map(d => `<span class="die-card" style="border-color:${color}55;">${diceIcons[d]}</span>`).join('');
}

function revealDiceHtml(dice){
    return dice.map((d,i) => `<span class="die-reveal" style="animation-delay:${i*70}ms;">${diceIcons[d]}</span>`).join('');
}

/* ════════════════════════════════════════════════════════
   PALIFICO: face-button locking
════════════════════════════════════════════════════════ */
function applyFaceButtonState(palificoActive, openingBidDone, lockedFace){
    const btns = document.querySelectorAll('.face-btn');

    if(!palificoActive){
        // Normal — all enabled
        btns.forEach(b => { b.disabled=false; b.style.opacity='1'; b.classList.remove('face-locked'); });
        updateBidUI();
        return;
    }

    if(!openingBidDone){
        // Palifico, no bid yet — disable ace (face=1) only
        btns.forEach((b,i) => {
            const face = i+1;
            if(face===1){ b.disabled=true; b.style.opacity='0.25'; b.classList.remove('face-locked'); }
            else { b.disabled=false; b.style.opacity='1'; b.classList.remove('face-locked'); }
        });
        // If current selection is ace, reset to 2
        if(currentBidFace===1){ currentBidFace=2; }
        updateBidUI();
    } else {
        // Palifico, face already locked
        currentBidFace = lockedFace; // force selection to locked face
        btns.forEach((b,i) => {
            const face = i+1;
            if(face===lockedFace){
                b.disabled=false; b.style.opacity='1'; b.classList.add('face-locked');
                b.style.background='var(--p)'; b.style.color='white';
            } else {
                b.disabled=true; b.style.opacity='0.2'; b.classList.remove('face-locked');
                b.style.background='#334155'; b.style.color='#94a3b8';
            }
        });
        document.getElementById('bid-count-val').innerText = currentBidCount;
    }
}

/* ════════════════════════════════════════════════════════
   SOCKET + STATE
════════════════════════════════════════════════════════ */
const socket = io();
let myName = '';
let currentBidCount = 1;
let currentBidFace  = 2;
let hasFiredConfetti   = false;
let hasFiredLossEffect = false;
let hasFiredPalifico   = false;
let chatPanelOpen = false;
let unreadCount   = 0;
let countdownInterval = null;
let winnerBarInterval = null;
let lastWinner = null;

// Sound-trigger tracking
let prevRoundIdx     = -1;
let prevIsShowdown   = false;
let prevIsMyTurn     = false;
let prevMyAlive      = true;
let prevPalificoActive = false;

// Dice render tracking
let renderedDiceKey = '';

/* ── Login ── */
function login(){
    const u=document.getElementById('user').value.trim();
    const p=document.getElementById('pass').value.trim();
    if(u&&p){ sfx.click(); socket.emit('login',{username:u,password:p,color:selectedColor}); }
}
document.getElementById('pass').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
document.addEventListener('pointerdown',()=>{if(!sfx.ac)sfx._ctx();},{once:true});

socket.on('loginSuccess',n=>{ myName=n; myColor=selectedColor; document.getElementById('login-box').style.display='none'; document.getElementById('game-box').style.display='block'; buildPhraseGrid(); });
socket.on('err',m=>alert(m));
socket.on('reloadAll',()=>location.reload());
socket.on('kicked',msg=>{alert(msg);location.reload();});

/* ── Sound toggle ── */
function toggleSound(){ sfx.on=!sfx.on; const btn=document.getElementById('sound-btn'); btn.textContent=sfx.on?'🔊':'🔇'; btn.classList.toggle('muted',!sfx.on); if(sfx.on)sfx.click(); }

/* ── Bid controls ── */
function changeCount(v){ currentBidCount=Math.max(1,currentBidCount+v); updateBidUI(); sfx.click(); }
function selectFace(f){ currentBidFace=f; updateBidUI(); sfx.click(); }
function updateBidUI(){
    document.getElementById('bid-count-val').innerText=currentBidCount;
    document.querySelectorAll('.face-btn').forEach((b,i)=>{
        if(!b.disabled){
            b.style.background=(i+1===currentBidFace)?'var(--p)':'#334155';
            b.style.color=(i+1===currentBidFace)?'white':'#94a3b8';
        }
    });
}
function confirmBid(){ socket.emit('bid',{count:currentBidCount,face:currentBidFace}); }
function callLiar()  { socket.emit('liar'); }
function movePlayer(i,d){ socket.emit('reorderPlayer',{index:i,direction:d}); }
function kickPlayer(name){ if(confirm(`Kick "${name}"?`)){socket.emit('kickPlayer',name);} }

/* ── Chat ── */
function buildPhraseGrid(){
    document.getElementById('phrase-grid').innerHTML=PHRASES.map(ph=>
        `<button class="phrase-btn" onclick="sendPhrase('${ph.replace(/'/g,"\\'")}')">${ph}</button>`
    ).join('');
}
function toggleChatPanel(){ chatPanelOpen=!chatPanelOpen; document.getElementById('chat-panel').classList.toggle('open',chatPanelOpen); if(chatPanelOpen){unreadCount=0;updateUnreadBadge();} }
document.addEventListener('click',e=>{ if(chatPanelOpen&&!e.target.closest('#chat-panel')&&!e.target.closest('#chat-fab')){ chatPanelOpen=false; document.getElementById('chat-panel').classList.remove('open'); } });
function sendPhrase(text){ socket.emit('chatMsg',text); chatPanelOpen=false; document.getElementById('chat-panel').classList.remove('open'); sfx.click(); }
function updateUnreadBadge(){ const b=document.getElementById('chat-unread-badge'); if(unreadCount>0){b.textContent=unreadCount>9?'9+':unreadCount;b.style.display='flex';}else b.style.display='none'; }
socket.on('chatMsg',msg=>{ showToast(msg.sender,msg.text,!!msg.system,msg.color); if(!chatPanelOpen){unreadCount++;updateUnreadBadge();} });
function showToast(sender,text,isSystem,senderColor){
    const area=document.getElementById('toast-area'), div=document.createElement('div');
    div.className='chat-toast'+(isSystem?' system-toast':'');
    const ns=senderColor?`color:${senderColor}`:'color:var(--p)';
    div.innerHTML=isSystem?`<span class="toast-text">${escHtml(text)}</span>`:`<span class="toast-sender" style="${ns}">${escHtml(sender)}</span><span class="toast-text">${escHtml(text)}</span>`;
    area.appendChild(div); setTimeout(()=>div.remove(),3100);
}

/* ── Countdown ── */
function startCountdown(endTs){
    clearInterval(countdownInterval); const total=endTs-Date.now(); if(total<=0)return;
    document.getElementById('countdown-wrap').style.display='block';
    countdownInterval=setInterval(()=>{
        const rem=endTs-Date.now();
        if(rem<=0){clearInterval(countdownInterval);document.getElementById('countdown-wrap').style.display='none';return;}
        document.getElementById('countdown-bar').style.width=Math.min(100,(rem/total)*100)+'%';
        document.getElementById('countdown-label').textContent=`Continuing in ${Math.ceil(rem/1000)}s… (all Ready to skip)`;
    },100);
}
function stopCountdown(){ clearInterval(countdownInterval); document.getElementById('countdown-wrap').style.display='none'; }

/* ── Winner overlay ── */
function showWinnerOverlay(name,color){
    if(lastWinner===name)return; lastWinner=name;
    document.getElementById('winner-name').textContent=name.toUpperCase();
    document.getElementById('winner-name').style.color=color||'var(--w)';
    document.getElementById('winner-name').style.textShadow=`0 0 30px ${color||'var(--w)'}`;
    document.getElementById('winner-overlay').classList.add('show');
    confetti({particleCount:250,spread:100,origin:{y:0.5},colors:[color,'#fbbf24','#ffffff']});
    setTimeout(()=>confetti({particleCount:150,spread:80,origin:{y:0.6},colors:[color,'#fbbf24']}),600);
    const duration=8000,start=Date.now();
    clearInterval(winnerBarInterval);
    winnerBarInterval=setInterval(()=>{
        const pct=Math.max(0,100-(Date.now()-start)/duration*100);
        document.getElementById('winner-bar').style.width=pct+'%';
        if(pct<=0){clearInterval(winnerBarInterval);document.getElementById('winner-overlay').classList.remove('show');lastWinner=null;}
    },100);
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function hexToRgba(hex,a){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }

/* ════════════════════════════════════════════════════════
   MAIN UPDATE HANDLER
════════════════════════════════════════════════════════ */
socket.on('update',({players,game,allModes,currentModeInfo,hostName})=>{
    const meObj     = players.find(p=>p.name===myName);
    if(meObj?.color) myColor=meObj.color;

    const isShowdown      = game.active && game.showingResults;
    const isPlaying       = game.active && !game.showingResults;
    const isMyTurn        = isPlaying && players[game.turn]?.name===myName;
    const amHost          = myName===hostName;
    const palificoActive  = !!game.palificoActive;
    const openingBidDone  = palificoActive && game.bid.count > 0;
    const lockedFace      = openingBidDone ? game.bid.face : 0;

    /* ── Sound triggers ── */
    const newRound = game.roundIdx!==prevRoundIdx && game.active && !isShowdown;
    if(newRound) sfx.roll();
    if(!prevIsShowdown && isShowdown) sfx.challenge();
    if(isShowdown && meObj?.isRoundWinner && !hasFiredConfetti) sfx.win();
    if(isShowdown && meObj?.isRoundLoser  && !hasFiredLossEffect) sfx.lose();
    if(!prevIsMyTurn && isMyTurn) sfx.yourTurn();
    if(prevMyAlive && meObj && !meObj.alive && game.active) sfx.eliminated();
    if(!game.active && game.winner && game.winner===myName && lastWinner!==myName) sfx.champion();
    // Palifico activation sound (once per trigger)
    if(!prevPalificoActive && palificoActive && !hasFiredPalifico){ sfx.palifico(); hasFiredPalifico=true; }
    if(!palificoActive) hasFiredPalifico=false;

    /* ── Winner overlay ── */
    if(!game.active && game.winner){
        const champ=players.find(p=>p.name===game.winner);
        showWinnerOverlay(game.winner,champ?.color);
    } else if(!game.winner && lastWinner){
        document.getElementById('winner-overlay').classList.remove('show');
        clearInterval(winnerBarInterval); lastWinner=null;
    }

    /* ── My dice tray ── */
    const myDiceKey = JSON.stringify(meObj?.dice)+game.active+isShowdown+game.roundIdx;
    if(meObj?.alive && game.active && !isShowdown){
        if(newRound){ animateMyDice(meObj.dice,myColor); renderedDiceKey=myDiceKey; }
        else if(myDiceKey!==renderedDiceKey){ renderMyDice(meObj.dice,myColor); renderedDiceKey=myDiceKey; }
    } else if(meObj?.alive && isShowdown){
        if(myDiceKey!==renderedDiceKey){ renderMyDice(meObj.dice,myColor); renderedDiceKey=myDiceKey; }
    } else if(!game.active){
        renderedDiceKey=''; renderMyDice([],myColor);
    } else if(!meObj?.alive){
        document.getElementById('myDice-tray').innerHTML=`<span style="font-size:20px;color:var(--d);">ELIMINATED</span>`;
        renderedDiceKey='elim';
    }

    /* ── Panel visibility ── */
    document.getElementById('ready-ui').style.display  = (!game.active||isShowdown)?'block':'none';
    document.getElementById('actions-ui').style.display = isPlaying?'block':'none';
    document.getElementById('action-card').className    = 'card '+(isMyTurn?'your-turn-active':'');

    /* ── Palifico banner ── */
    const banner = document.getElementById('palifico-banner');
    if(palificoActive && isPlaying){
        banner.classList.add('show');
        document.getElementById('palifico-sub').textContent = openingBidDone
            ? `Face locked to ${diceIcons[lockedFace]} — raise count only • Aces are NOT wild`
            : `Opening bid sets the face — everyone must raise count only`;
    } else {
        banner.classList.remove('show');
    }

    /* ── Face button state (palifico locking) ── */
    if(isMyTurn){ applyFaceButtonState(palificoActive, openingBidDone, lockedFace); }
    else {
        // Not my turn — just keep buttons in correct visual state but don't re-enable
        document.querySelectorAll('.face-btn').forEach(b=>{b.disabled=false;b.style.opacity='1';b.classList.remove('face-locked');});
        updateBidUI();
    }

    /* ── Countdown ── */
    if(isShowdown && game.autoAdvanceAt) startCountdown(game.autoAdvanceAt); else stopCountdown();

    /* ── Round effects ── */
    if(isShowdown && meObj?.isRoundWinner && !hasFiredConfetti){
        confetti({particleCount:120,spread:70,origin:{y:0.6},colors:[myColor,'#fbbf24']}); hasFiredConfetti=true;
    }
    if(isShowdown && meObj?.isRoundLoser && !hasFiredLossEffect){
        document.body.classList.add('flash-red-active'); document.getElementById('main-ui').classList.add('shake-effect');
        if(navigator.vibrate) navigator.vibrate([200,100,200]);
        setTimeout(()=>{ document.body.classList.remove('flash-red-active'); document.getElementById('main-ui').classList.remove('shake-effect'); },750);
        hasFiredLossEffect=true;
    }
    if(!isShowdown){ hasFiredConfetti=false; hasFiredLossEffect=false; }

    /* ── Mode selector ── */
    if(!game.active){
        document.getElementById('mode-desc').innerText=currentModeInfo.desc;
        document.getElementById('mode-selectors').innerHTML=allModes.map(m=>
            `<button style="background:${game.mode===m?'var(--p)':'#334155'};color:white;padding:8px 12px;margin:2px;border-radius:8px;font-size:11px" onclick="socket.emit('changeMode','${m}')">${m}</button>`
        ).join('');
    }

    /* ── Ready button ── */
    const readyBtn=document.getElementById('readyBtn');
    readyBtn.innerText   = meObj?.ready?'WAITING FOR OTHERS':(isShowdown?'SKIP WAIT':'READY TO PLAY');
    readyBtn.className   = 'btn-main '+(meObj?.ready?'btn-p':'btn-s');

    /* ── Status text ── */
    const statusEl = document.getElementById('status');
    if(isMyTurn){
        const palLabel = palificoActive ? (openingBidDone ? ` • ${diceIcons[lockedFace]} locked` : ' • set face') : '';
        statusEl.innerHTML=`<span style="color:var(--s);">🔥 YOUR TURN 🔥${escHtml(palLabel)}</span>`;
        // Auto-suggest: during palifico after opening, only count auto-increase
        if(palificoActive && openingBidDone){
            currentBidFace  = lockedFace;
            if(currentBidCount <= game.bid.count) currentBidCount = game.bid.count+1;
        } else if(!palificoActive){
            if(currentBidCount<=game.bid.count){
                currentBidCount=game.bid.count+(game.bid.face===6?1:0);
                currentBidFace=game.bid.face===6?2:game.bid.face+1;
            }
        }
        if(navigator.vibrate) navigator.vibrate(100);
    } else {
        const turnPlayer=players[game.turn];
        const turnColor=turnPlayer?.color||'var(--t-mute)';
        statusEl.innerHTML=isShowdown
            ?`<span style="color:var(--w);">🔍 SHOWDOWN</span>`
            :`<span style="color:${turnColor};">WAITING FOR ${escHtml(turnPlayer?.name||'...')}</span>`;
    }

    /* ── Current bid display ── */
    document.getElementById('currentBid').innerText=game.bid.count>0
        ?`${game.bid.count} × ${diceIcons[game.bid.face]}`:'OPENING…';

    /* ── Player list ── */
    document.getElementById('playerList').innerHTML=players.map((p,i)=>{
        let cls='player-row';
        if(p.isRoundWinner)              cls+=' p-winner';
        if(p.isRoundLoser)               cls+=' p-loser';
        if(game.turn===i && isPlaying)   cls+=' p-turn';
        if(!p.online)                    cls+=' offline';

        const colorBar   = `<div class="p-color-bar" style="background:${p.color||'transparent'}"></div>`;
        const reorderBtns= !game.active?`<div style="display:flex;flex-direction:column;margin-right:6px;"><button class="reorder-btn" onclick="movePlayer(${i},-1)">▲</button><button class="reorder-btn" onclick="movePlayer(${i},1)">▼</button></div>`:'';
        const canKick    = amHost&&p.name!==myName;
        const kickBtn    = canKick?`<button class="kick-btn" onclick="kickPlayer('${escHtml(p.name)}')">KICK</button>`:'';
        const hostBadge  = (p.name===hostName&&!game.active)?`<span style="font-size:9px;background:rgba(251,191,36,0.2);color:var(--w);border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:700;">HOST</span>`:'';
        const avatar     = `<span class="p-avatar" style="background:${p.color||'#334155'};">${(p.name[0]||'?').toUpperCase()}</span>`;

        // 1-die palifico indicator
        const palTag = (palificoActive && p.alive && p.count===1)?`<span style="font-size:10px;background:rgba(251,191,36,0.2);color:var(--w);border-radius:4px;padding:1px 6px;margin-left:4px;font-weight:700;">🎯</span>`:'';

        let diceDisplay;
        if(!game.active){
            diceDisplay='🎲×5';
        } else if(p.alive){
            if(isShowdown){
                diceDisplay=`<span style="display:flex;gap:2px;flex-wrap:wrap;justify-content:flex-end;">${revealDiceHtml(p.dice)}</span>`;
            } else {
                diceDisplay='<span style="display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;">'
                    +Array.from({length:p.count},()=>`<span style="width:20px;height:20px;border-radius:5px;background:${hexToRgba(p.color||'#3b82f6',0.35)};border:1.5px solid ${hexToRgba(p.color||'#3b82f6',0.6)};display:inline-flex;align-items:center;justify-content:center;font-size:11px;">🎲</span>`).join('')+'</span>';
            }
        } else { diceDisplay='❌'; }

        return `<div class="${cls}">
            ${colorBar}
            <div style="display:flex;align-items:center;flex:1;min-width:0;padding-left:6px;">
                ${reorderBtns}${avatar}
                <span style="display:flex;align-items:center;gap:3px;flex-wrap:wrap;min-width:0;">
                    <span style="font-weight:700;font-size:14px;">${escHtml(p.name)}</span>
                    ${hostBadge}${palTag}
                    ${p.ready?'<span class="ready-badge">✓</span>':''}${kickBtn}
                </span>
            </div>
            <div style="flex-shrink:0;margin-left:8px;">${diceDisplay}</div>
        </div>`;
    }).join('');

    /* ── Game log ── */
    document.getElementById('logs').innerHTML=game.logs.slice().reverse().map(l=>{
        let s='margin-bottom:4px;border-left:2px solid #334155;padding-left:8px;';
        if(l.includes('WON THE ROUND')) s+='color:var(--w);font-weight:bold;border-left-color:var(--w);';
        if(l.includes('ELIMINATED')||l.includes('KICKED')) s+='color:var(--d);border-left-color:var(--d);';
        if(l.includes('CHAMPION')) s+='color:var(--w);font-weight:900;font-size:14px;border-left-color:var(--w);';
        if(l.includes('PALIFICO')) s+='color:var(--w);font-weight:bold;border-left-color:var(--w);font-style:italic;';
        return `<div style="${s}">${escHtml(l)}</div>`;
    }).join('');

    /* ── Update prev trackers ── */
    prevRoundIdx       = game.roundIdx;
    prevIsShowdown     = isShowdown;
    prevIsMyTurn       = isMyTurn;
    prevPalificoActive = palificoActive;
    if(meObj) prevMyAlive=meObj.alive;
});

updateBidUI();
</script>
