<!DOCTYPE html>
<html>
<head>
    <title>Perudo Ultimate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <style>
        :root { --p: #3b82f6; --s: #10b981; --d: #ef4444; --bg: #0f172a; --c: #1e293b; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: var(--c); padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .dice { font-size: 42px; color: #fbbf24; letter-spacing: 5px; min-height: 50px; }
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #334155; }
        .active-turn { background: #1e40af; border-radius: 10px; border-bottom: none; }
        .offline { opacity: 0.3; filter: grayscale(1); }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; width: 80%; margin: 5px; font-size: 16px; }
        button { border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-p { background: var(--p); color: white; width: 100%; }
        .btn-s { background: var(--s); color: white; width: 100%; }
        .btn-d { background: var(--d); color: white; }
        .order-btn { background: #334155; color: white; padding: 4px 8px; font-size: 10px; margin-bottom: 2px; border-radius: 4px; }
        #logs { font-size: 13px; color: #94a3b8; height: 120px; overflow-y: auto; text-align: left; padding: 10px; }
        .dice-small { font-size: 20px; color: #fbbf24; }
    </style>
</head>
<body>
    <div class="container">
        <div id="login-box" class="card">
            <h2 style="color: var(--p);">🎲 PERUDO ULTIMATE</h2>
            <input type="text" id="user" placeholder="Tên đăng nhập">
            <input type="password" id="pass" placeholder="Mật khẩu">
            <button class="btn-p" style="margin-top:15px" onclick="login()">ĐĂNG NHẬP / ĐĂNG KÝ</button>
            <p style="font-size: 11px; color: #64748b; margin-top: 10px;">Ghi nhớ mật khẩu để vào lại khi rớt mạng.</p>
        </div>

        <div id="game-box" style="display:none">
            <div class="card">
                <small style="color: #94a3b8;">Xúc xắc của bạn</small>
                <div id="myDice" class="dice"></div>
            </div>

            <div class="card">
                <div id="status" style="font-weight:bold; margin-bottom:5px"></div>
                <h2 id="currentBid" style="color:var(--p); margin: 10px 0;">---</h2>
                
                <div id="actions" style="display:none">
                    <div style="display:flex; justify-content:center; gap:10px; margin-bottom:10px">
                        <div><small>Số lượng</small><br><input type="number" id="bc" value="1" style="width:60px"></div>
                        <div><small>Mặt (1=Ace)</small><br><input type="number" id="bf" value="2" min="1" max="6" style="width:60px"></div>
                    </div>
                    <button class="btn-s" onclick="bid()" style="margin-bottom:10px">ĐẶT THẦU</button><br>
                    <button class="btn-d" onclick="liar()" style="width:100%">HÔ LIAR!</button>
                </div>

                <div id="result-box" style="display:none">
                    <button class="btn-s" onclick="nextRound()">TIẾP TỤC VÒNG MỚI ⮕</button>
                </div>
                <button id="startBtn" onclick="start()" class="btn-p" style="display:none">BẮT ĐẦU GAME</button>
            </div>

            <div class="card" id="playerList" style="padding:0"></div>
            <div class="card" id="logs"></div>
            <button onclick="resetRoom()" style="background:none; color:#475569; font-size:10px; width:100%">RESET PHÒNG (KHI LỖI)</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const diceIcons = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
        let myName = "";

        if (localStorage.getItem('p_user')) {
            document.getElementById('user').value = localStorage.getItem('p_user');
            document.getElementById('pass').value = localStorage.getItem('p_pass');
            // Tự động đăng nhập
            setTimeout(login, 500);
        }

        function login() {
            const username = document.getElementById('user').value.trim();
            const password = document.getElementById('pass').value.trim();
            if (!username || !password) return;
            socket.emit('login', { username, password });
        }

        socket.on('loginSuccess', (name) => {
            myName = name;
            localStorage.setItem('p_user', name);
            localStorage.setItem('p_pass', document.getElementById('pass').value);
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('game-box').style.display = 'block';
        });

        socket.on('err', (m) => alert(m));
        socket.on('reloadAll', () => { localStorage.clear(); location.reload(); });

        function start() { socket.emit('start'); }
        function bid() { socket.emit('bid', { count: parseInt(bc.value), face: parseInt(bf.value) }); }
        function liar() { socket.emit('liar'); }
        function nextRound() { socket.emit('nextRound'); }
        function resetRoom() { if(confirm("Xóa sạch toàn bộ dữ liệu phòng?")) socket.emit('resetRoom'); }
        function movePlayer(index, direction) { socket.emit('movePlayer', { index, direction }); }

        socket.on('update', ({players, game, me}) => {
            const meObj = players.find(p => p.name === myName);
            if (meObj) document.getElementById('myDice').innerText = meObj.dice.length > 0 ? meObj.dice.map(d => diceIcons[d]).join(' ') : "ĐÃ BỊ LOẠI";

            document.getElementById('currentBid').innerText = game.bid.count > 0 ? `${game.bid.count} con [${game.bid.face === 1 ? 'Ace' : game.bid.face}]` : "CHƯA CÓ THẦU";
            
            const isMyTurn = game.active && !game.showingResults && players[game.turn]?.name === myName;
            document.getElementById('actions').style.display = isMyTurn ? 'block' : 'none';
            document.getElementById('result-box').style.display = (game.showingResults && game.active) ? 'block' : 'none';
            document.getElementById('startBtn').style.display = (!game.active && players.length >= 2) ? 'block' : 'none';

            document.getElementById('status').innerText = game.showingResults ? "KẾT QUẢ VÒNG" : (isMyTurn ? "🔥 LƯỢT CỦA BẠN" : `Đang đợi: ${players[game.turn]?.name || '...'}`);
            document.getElementById('status').style.color = game.showingResults ? "#fbbf24" : (isMyTurn ? var(--s) : "#94a3b8");

            document.getElementById('playerList').innerHTML = players.map((p, i) => `
                <div class="player-row ${game.turn === i && game.active ? 'active-turn' : ''} ${!p.online ? 'offline' : ''}">
                    <div style="display:flex; align-items:center">
                        ${!game.active ? `
                            <div style="display:flex; flex-direction:column; margin-right:8px">
                                <button class="order-btn" onclick="movePlayer(${i}, -1)">▲</button>
                                <button class="order-btn" onclick="movePlayer(${i}, 1)">▼</button>
                            </div>
                        ` : ''}
                        <span>${p.online ? '🟢' : '⚪'} ${p.name} ${p.name === myName ? '<b>(BẠN)</b>' : ''}</span>
                    </div>
                    <span class="dice-small">${p.alive ? (game.showingResults || !game.active ? p.dice.map(d => diceIcons[d]).join('') : '🎲'.repeat(p.count)) : '❌'}</span>
                </div>
            `).join('');

            document.getElementById('logs').innerHTML = game.logs.slice().reverse().map(l => `<div>${l}</div>`).join('');
        });
    </script>
</body>
</html>
