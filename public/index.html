<!DOCTYPE html>
<html>
<head>
    <title>Perudo Master - PowerAce</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <style>
        :root { --p: #3b82f6; --s: #10b981; --d: #ef4444; --bg: #0f172a; --c: #1e293b; --t: #f8fafc; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--t); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; }
        .card { background: var(--c); padding: 15px; border-radius: 16px; margin-bottom: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        .dice { font-size: 45px; color: #fbbf24; letter-spacing: 5px; min-height: 50px; margin: 10px 0; text-align: center; }
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #334155; }
        .player-row.active { background: #1e40af; border-radius: 12px; border-bottom: none; }
        .offline { opacity: 0.3; filter: grayscale(1); }
        button { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-p { background: var(--p); color: white; width: 100%; }
        .btn-s { background: var(--s); color: white; width: 100%; }
        .btn-d { background: var(--d); color: white; }
        .mode-btn { background: #334155; color: #94a3b8; margin: 4px; font-size: 11px; padding: 8px 12px; }
        .mode-active { background: var(--p); color: white; box-shadow: 0 0 10px var(--p); }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; }
        input[type="number"] { font-size: 20px; text-align: center; }
        #logs { font-size: 12px; color: #94a3b8; height: 110px; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <div id="login-box" class="card" style="text-align: center;">
            <h2 style="color: var(--p)">🎲 PERUDO PRO</h2>
            <input type="text" id="user" placeholder="Username" style="margin-bottom:10px">
            <input type="password" id="pass" placeholder="Password" style="margin-bottom:15px">
            <button class="btn-p" onclick="login()">ĐĂNG NHẬP</button>
        </div>

        <div id="game-box" style="display:none">
            <div class="card"><div id="myDice" class="dice"></div></div>

            <div class="card" style="text-align: center;">
                <div id="lobby-ui">
                    <div id="mode-selectors"></div>
                    <div id="mode-desc" style="font-size: 11px; color: #64748b; margin-top: 10px; font-style: italic;"></div>
                    <button id="startBtn" class="btn-p" onclick="socket.emit('start')" style="display:none; margin-top: 10px;">BẮT ĐẦU GAME</button>
                </div>

                <div id="gameplay-ui" style="display:none">
                    <div id="status" style="font-weight: bold; color: var(--s); margin-bottom: 5px;"></div>
                    <h1 id="currentBid" style="margin: 5px 0; color: var(--p);">---</h1>
                    <div id="actions" style="display:none">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                            <div><small>Số lượng</small><br><input type="number" id="bc" value="1"></div>
                            <div><small>Mặt</small><br><input type="number" id="bf" value="2" min="1" max="6"></div>
                            <button class="btn-s" onclick="socket.emit('bid', {count:parseInt(bc.value), face:parseInt(bf.value)})" style="grid-column: span 2;">ĐẶT THẦU</button>
                            <button class="btn-d" onclick="socket.emit('liar')" style="grid-column: span 2;">HÔ LIAR!</button>
                        </div>
                    </div>
                    <div id="result-ui" style="display:none; margin-top: 10px;">
                        <button class="btn-s" onclick="socket.emit('nextRound')">SẴN SÀNG VÒNG TIẾP ⮕</button>
                    </div>
                </div>
            </div>

            <div class="card" style="padding: 5px;"><div id="playerList"></div></div>
            <div class="card" id="logs"></div>
            <button onclick="confirm('Reset?') && socket.emit('resetRoom')" style="background:none; color:#334155; font-size:10px; width: 100%;">RESET SERVER</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const diceIcons = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
        let myName = "";

        if (localStorage.getItem('p_user')) {
            document.getElementById('user').value = localStorage.getItem('p_user');
            document.getElementById('pass').value = localStorage.getItem('p_pass');
        }

        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if (u && p) {
                localStorage.setItem('p_user', u); localStorage.setItem('p_pass', p);
                socket.emit('login', { username: u, password: p });
            }
        }

        socket.on('loginSuccess', (n) => { myName = n; document.getElementById('login-box').style.display = 'none'; document.getElementById('game-box').style.display = 'block'; });
        socket.on('err', (m) => alert(m));
        socket.on('reloadAll', () => { localStorage.clear(); location.reload(); });

        socket.on('update', ({ players, game, modeInfo }) => {
            const meObj = players.find(p => p.name === myName);
            const myDiceEl = document.getElementById('myDice');
            
            myDiceEl.innerText = game.active ? (meObj?.alive ? meObj.dice.map(d => diceIcons[d]).join(' ') : "BỊ LOẠI") : "PHÒNG CHỜ";
            myDiceEl.style.fontSize = game.active ? "45px" : "20px";

            document.getElementById('lobby-ui').style.display = game.active ? 'none' : 'block';
            document.getElementById('gameplay-ui').style.display = game.active ? 'block' : 'none';

            if (!game.active) {
                const modes = ["Classic", "PowerAce", "OneAce", "NoJoker"];
                document.getElementById('mode-selectors').innerHTML = modes.map(m => `
                    <button class="mode-btn ${game.mode === m ? 'mode-active' : ''}" onclick="socket.emit('changeMode', '${m}')">${m.toUpperCase()}</button>
                `).join('');
                document.getElementById('mode-desc').innerText = modeInfo.desc;
                document.getElementById('startBtn').style.display = players.length >= 2 ? 'block' : 'none';
            } else {
                const isTurn = !game.showingResults && players[game.turn]?.name === myName;
                document.getElementById('currentBid').innerText = game.bid.count > 0 ? `${game.bid.count} con [${game.bid.face === 1 ? 'Ace' : game.bid.face}]` : "MỞ BÁT...";
                document.getElementById('actions').style.display = isTurn ? 'block' : 'none';
                document.getElementById('result-ui').style.display = game.showingResults ? 'block' : 'none';
                document.getElementById('status').innerText = game.showingResults ? "KẾT QUẢ" : (isTurn ? "🔥 LƯỢT BẠN" : `Đợi: ${players[game.turn]?.name}`);
            }

            document.getElementById('playerList').innerHTML = players.map((p, i) => `
                <div class="player-row ${game.turn === i && game.active ? 'active' : ''} ${!p.online ? 'offline' : ''}">
                    <div style="display:flex; align-items:center">
                        ${!game.active ? `<button style="padding:2px;font-size:8px" onclick="socket.emit('movePlayer',{index:${i},direction:-1})">▲</button><button style="padding:2px;font-size:8px" onclick="socket.emit('movePlayer',{index:${i},direction:1})">▼</button>` : ''}
                        <span style="font-size:13px;margin-left:5px">${p.online ? '🟢' : '⚪'} ${p.name}</span>
                    </div>
                    <span style="font-size:18px; color:#fbbf24">${!game.active ? '🎲x5' : (p.alive ? (game.showingResults ? p.dice.map(d => diceIcons[d]).join('') : '🎲'.repeat(p.count)) : '❌')}</span>
                </div>
            `).join('');
            document.getElementById('logs').innerHTML = game.logs.slice().reverse().map(l => `<div>${l}</div>`).join('');
        });
    </script>
</body>
</html>
