<!DOCTYPE html>
<html>
<head>
    <title>Perudo Master - Modular Rules</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <style>
        :root { --p: #3b82f6; --s: #10b981; --d: #ef4444; --bg: #0f172a; --c: #1e293b; --t: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--t); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; }
        .card { background: var(--c); padding: 15px; border-radius: 16px; margin-bottom: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        
        /* Login */
        .login-input { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        
        /* Dice & Bidding */
        .dice-display { font-size: 45px; color: #fbbf24; letter-spacing: 5px; min-height: 50px; margin: 10px 0; }
        .bid-val { font-size: 32px; font-weight: bold; color: var(--p); margin: 5px 0; }
        
        /* Player List */
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #334155; }
        .player-row.active { background: #1e40af; border-radius: 12px; border-bottom: none; }
        .offline { opacity: 0.3; filter: grayscale(1); }
        
        /* Controls */
        button { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-p { background: var(--p); color: white; width: 100%; }
        .btn-s { background: var(--s); color: white; width: 100%; }
        .btn-d { background: var(--d); color: white; }
        
        .mode-btn { background: #334155; color: #94a3b8; margin: 4px; font-size: 11px; padding: 8px 12px; }
        .mode-active { background: var(--p); color: white; box-shadow: 0 0 10px var(--p); }
        
        .order-btn { background: #334155; color: white; padding: 2px 8px; font-size: 10px; margin-bottom: 2px; border-radius: 4px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        input[type="number"] { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 8px; width: 80%; font-size: 18px; text-align: center; }
        
        #logs { font-size: 12px; color: #94a3b8; height: 110px; overflow-y: auto; text-align: left; line-height: 1.5; }
        .desc-box { font-size: 11px; color: #64748b; margin-top: 10px; font-style: italic; min-height: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- ĐĂNG NHẬP -->
        <div id="login-box" class="card" style="text-align: center;">
            <h2 style="color: var(--p); margin-top: 0;">🎲 PERUDO PRO</h2>
            <input type="text" id="user" class="login-input" placeholder="Tên tài khoản">
            <input type="password" id="pass" class="login-input" placeholder="Mật khẩu">
            <button class="btn-p" onclick="login()">ĐĂNG NHẬP / ĐĂNG KÝ</button>
        </div>

        <!-- PHÒNG CHƠI -->
        <div id="game-box" style="display:none">
            <div class="card" style="text-align: center;">
                <small style="color: #64748b;">Xúc xắc của bạn:</small>
                <div id="myDice" class="dice-display"></div>
            </div>

            <div class="card" style="text-align: center;">
                <!-- LOBBY: CHỌN LUẬT & START -->
                <div id="lobby-ui">
                    <div id="mode-selectors"></div>
                    <div id="mode-desc" class="desc-box"></div>
                    <button id="startBtn" class="btn-p" onclick="sendStart()" style="display:none; margin-top: 10px;">BẮT ĐẦU GAME</button>
                </div>

                <!-- GAMEPLAY: THẦU & LIAR -->
                <div id="gameplay-ui" style="display:none">
                    <div id="status" style="font-weight: bold; color: var(--s); margin-bottom: 5px;"></div>
                    <div id="currentBid" class="bid-val">---</div>
                    
                    <div id="actions" style="display:none">
                        <div class="grid-2">
                            <div><small>Số lượng</small><br><input type="number" id="bc" value="1"></div>
                            <div><small>Mặt</small><br><input type="number" id="bf" value="2" min="1" max="6"></div>
                            <button class="btn-s" onclick="sendBid()" style="grid-column: span 2;">ĐẶT THẦU</button>
                            <button class="btn-d" onclick="sendLiar()" style="grid-column: span 2;">HÔ LIAR!</button>
                        </div>
                    </div>

                    <div id="result-ui" style="display:none; margin-top: 10px;">
                        <button class="btn-s" onclick="sendNextRound()">SẴN SÀNG VÒNG TIẾP ⮕</button>
                    </div>
                </div>
            </div>

            <!-- DANH SÁCH NGƯỜI CHƠI -->
            <div class="card" style="padding: 5px;">
                <div id="playerList"></div>
            </div>

            <!-- NHẬT KÝ -->
            <div class="card" id="logs"></div>
            
            <button onclick="resetRoom()" style="background:none; color:#334155; font-size:10px; width: 100%;">RESET SERVER (XÓA DATA)</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const diceIcons = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
        let myName = "";

        // Tự động điền login
        if (localStorage.getItem('p_user')) {
            document.getElementById('user').value = localStorage.getItem('p_user');
            document.getElementById('pass').value = localStorage.getItem('p_pass');
        }

        function login() {
            const username = document.getElementById('user').value.trim();
            const password = document.getElementById('pass').value.trim();
            if (!username || !password) return alert("Nhập đủ thông tin!");
            localStorage.setItem('p_user', username);
            localStorage.setItem('p_pass', password);
            socket.emit('login', { username, password });
        }

        socket.on('loginSuccess', (name) => {
            myName = name;
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('game-box').style.display = 'block';
        });

        socket.on('err', (m) => alert(m));
        socket.on('reloadAll', () => { localStorage.clear(); location.reload(); });

        // Gửi sự kiện lên server
        const sendStart = () => socket.emit('start');
        const sendBid = () => socket.emit('bid', { count: parseInt(bc.value), face: parseInt(bf.value) });
        const sendLiar = () => socket.emit('liar');
        const sendNextRound = () => socket.emit('nextRound');
        const changeMode = (m) => socket.emit('changeMode', m);
        const movePlayer = (i, d) => socket.emit('movePlayer', { index: i, direction: d });
        const resetRoom = () => confirm("Xóa sạch data phòng?") && socket.emit('resetRoom');

        // Cập nhật giao diện từ server
        socket.on('update', ({ players, game, modeInfo }) => {
            const meObj = players.find(p => p.name === myName);
            const myDiceEl = document.getElementById('myDice');
            
            // 1. Hiển thị xúc xắc
            if (!game.active) {
                myDiceEl.innerText = "PHÒNG CHỜ"; myDiceEl.style.fontSize = "20px";
            } else {
                myDiceEl.style.fontSize = "45px";
                myDiceEl.innerText = (meObj && meObj.alive) ? meObj.dice.map(d => diceIcons[d]).join(' ') : "BỊ LOẠI";
            }

            // 2. Cấu trúc màn hình (Lobby vs Game)
            document.getElementById('lobby-ui').style.display = game.active ? 'none' : 'block';
            document.getElementById('gameplay-ui').style.display = game.active ? 'block' : 'none';

            if (!game.active) {
                // Hiển thị chọn mode (Lấy danh sách mode phổ biến - bạn có thể sửa tại đây)
                const modes = ["Classic", "NoJoker", "Speedy"];
                document.getElementById('mode-selectors').innerHTML = modes.map(m => `
                    <button class="mode-btn ${game.mode === m ? 'mode-active' : ''}" onclick="changeMode('${m}')">${m.toUpperCase()}</button>
                `).join('');
                document.getElementById('mode-desc').innerText = modeInfo.desc;
                document.getElementById('startBtn').style.display = players.length >= 2 ? 'block' : 'none';
            } else {
                // Hiển thị gameplay
                const isMyTurn = !game.showingResults && players[game.turn]?.name === myName;
                document.getElementById('currentBid').innerText = game.bid.count > 0 ? `${game.bid.count} con [${game.bid.face === 1 ? 'Ace' : game.bid.face}]` : "MỞ BÁT...";
                document.getElementById('actions').style.display = isMyTurn ? 'block' : 'none';
                document.getElementById('result-ui').style.display = game.showingResults ? 'block' : 'none';
                
                const statusEl = document.getElementById('status');
                statusEl.innerText = game.showingResults ? "XEM KẾT QUẢ" : (isMyTurn ? "🔥 LƯỢT CỦA BẠN" : `Lượt của: ${players[game.turn]?.name}`);
                statusEl.style.color = isMyTurn ? "var(--s)" : "#94a3b8";
            }

            // 3. Danh sách người chơi
            document.getElementById('playerList').innerHTML = players.map((p, i) => `
                <div class="player-row ${game.turn === i && game.active ? 'active' : ''} ${!p.online ? 'offline' : ''}">
                    <div style="display:flex; align-items:center">
                        ${!game.active ? `<div style="display:flex; flex-direction:column; margin-right:8px">
                            <button class="order-btn" onclick="movePlayer(${i},-1)">▲</button>
                            <button class="order-btn" onclick="movePlayer(${i},1)">▼</button>
                        </div>` : ''}
                        <span style="font-size:14px">${p.online ? '🟢' : '⚪'} ${p.name}</span>
                    </div>
                    <span style="font-size:18px; color:#fbbf24">
                        ${!game.active ? '🎲x5' : (p.alive ? (game.showingResults ? p.dice.map(d => diceIcons[d]).join('') : '🎲'.repeat(p.count)) : '❌')}
                    </span>
                </div>
            `).join('');

            // 4. Nhật ký
            document.getElementById('logs').innerHTML = game.logs.slice().reverse().map(l => `<div>${l}</div>`).join('');
        });
    </script>
</body>
</html>
