 <!DOCTYPE html>
<html>
<head>
    <title>Perudo Master</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <style>
        :root { --p: #3b82f6; --s: #10b981; --d: #ef4444; --bg: #0f172a; --c: #1e293b; }
        body { font-family: system-ui; background: var(--bg); color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--c); padding: 15px; border-radius: 12px; margin-bottom: 10px; width: 100%; max-width: 450px; box-sizing: border-box; }
        .dice { font-size: 40px; color: #fbbf24; letter-spacing: 5px; min-height: 48px; }
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #334155; }
        .active-turn { background: #1e40af; border-radius: 8px; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; width: 60px; text-align: center; font-size: 16px; }
        button { border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-p { background: var(--p); color: white; width: 100%; }
        .btn-s { background: var(--s); color: white; width: 100%; }
        .btn-d { background: var(--d); color: white; }
        .mode-btn { background: #334155; color: #94a3b8; margin: 3px; font-size: 12px; }
        .mode-active { background: var(--p); color: white; }
        .info-icon { background: #475569; border-radius: 50%; width: 18px; height: 18px; display: inline-block; font-size: 12px; line-height: 18px; cursor: help; }
        #logs { font-size: 12px; color: #94a3b8; height: 100px; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>
    <div id="login-box" class="card" style="text-align: center;">
        <h2 style="color: var(--p)">🎲 PERUDO MASTER</h2>
        <input type="text" id="user" placeholder="Tên..." style="width: 80%"><br>
        <input type="password" id="pass" placeholder="Mật khẩu..." style="width: 80%"><br><br>
        <button class="btn-p" onclick="login()">ĐĂNG NHẬP</button>
    </div>

    <div id="game-box" style="display:none; width: 100%; max-width: 450px;">
        <div class="card" style="text-align: center;">
            <div id="myDice" class="dice"></div>
        </div>

        <div class="card" style="text-align: center;">
            <!-- CHỌN LUẬT -->
            <div id="lobby-modes">
                <div style="font-size: 13px; margin-bottom: 8px; color: #94a3b8;">Chọn chế độ chơi:</div>
                <button id="m-Classic" class="mode-btn" onclick="changeMode('Classic')">CLASSIC</button>
                <button id="m-Simple" class="mode-btn" onclick="changeMode('Simple')">SIMPLE</button>
                <button id="m-FixedFace" class="mode-btn" onclick="changeMode('FixedFace')">FIXED</button>
                <div id="mode-desc" style="font-size: 11px; color: #64748b; margin-top: 8px; font-style: italic;"></div>
            </div>

            <div id="game-info" style="display:none">
                <div id="status" style="font-weight: bold; font-size: 14px; margin-bottom: 5px;"></div>
                <h2 id="currentBid" style="color:var(--p); margin: 10px 0;">---</h2>
            </div>

            <div id="actions" style="display:none">
                <div style="margin-bottom: 10px;">
                    <input type="number" id="bc" value="1"> con 
                    <input type="number" id="bf" value="2" min="1" max="6">
                </div>
                <button class="btn-s" onclick="bid()" style="margin-bottom: 5px; width: 100%;">THẦU</button>
                <button class="btn-d" onclick="liar()" style="width: 100%;">LIAR!</button>
            </div>

            <div id="result-box" style="display:none">
                <button class="btn-s" onclick="nextRound()" style="width: 100%;">TIẾP TỤC ⮕</button>
            </div>
            
            <button id="startBtn" onclick="start()" class="btn-p" style="display:none; margin-top: 10px;">BẮT ĐẦU GAME</button>
        </div>

        <div class="card" id="playerList" style="padding:0"></div>
        <div class="card" id="logs"></div>
        <button onclick="resetRoom()" style="background:none; color:#475569; font-size:10px; width: 100%;">Reset Server</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const diceIcons = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
        let myName = "";

        if (localStorage.getItem('p_user')) {
            document.getElementById('user').value = localStorage.getItem('p_user');
            document.getElementById('pass').value = localStorage.getItem('p_pass');
        }

        function login() {
            const username = document.getElementById('user').value.trim();
            const password = document.getElementById('pass').value.trim();
            if (!username || !password) return alert("Thiếu thông tin");
            socket.emit('login', { username, password });
        }

        socket.on('loginSuccess', (name) => {
            myName = name;
            localStorage.setItem('p_user', name);
            localStorage.setItem('p_pass', document.getElementById('pass').value);
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('game-box').style.display = 'block';
        });

        function changeMode(m) { socket.emit('changeMode', m); }
        function start() { socket.emit('start'); }
        function bid() { socket.emit('bid', { count: parseInt(bc.value), face: parseInt(bf.value) }); }
        function liar() { socket.emit('liar'); }
        function nextRound() { socket.emit('nextRound'); }
        function resetRoom() { if(confirm("Reset sạch?")) socket.emit('resetRoom'); }
        function movePlayer(i, d) { socket.emit('movePlayer', {index:i, direction:d}); }

        socket.on('err', (m) => alert(m));
        socket.on('reloadAll', () => { localStorage.clear(); location.reload(); });

        socket.on('update', ({players, game, modeDesc}) => {
            const meObj = players.find(p => p.name === myName);
            const myDiceEl = document.getElementById('myDice');
            
            // Xúc xắc bản thân
            if (!game.active) {
                myDiceEl.innerText = "SẴN SÀNG"; myDiceEl.style.fontSize = "20px";
            } else {
                myDiceEl.style.fontSize = "40px";
                myDiceEl.innerText = (meObj && meObj.alive) ? meObj.dice.map(d => diceIcons[d]).join(' ') : "BỊ LOẠI";
            }

            // Giao diện Lobby / Game
            document.getElementById('lobby-modes').style.display = game.active ? 'none' : 'block';
            document.getElementById('game-info').style.display = game.active ? 'block' : 'none';
            document.getElementById('mode-desc').innerText = modeDesc;
            
            // Highlight nút mode
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('mode-active'));
            const activeBtn = document.getElementById('m-' + game.mode);
            if (activeBtn) activeBtn.classList.add('mode-active');

            // Thầu & Lượt
            document.getElementById('currentBid').innerText = game.bid.count > 0 ? `${game.bid.count} con [${game.bid.face === 1 ? 'Ace' : game.bid.face}]` : "CHỜ THẦU";
            const isMyTurn = game.active && !game.showingResults && players[game.turn]?.name === myName;
            document.getElementById('actions').style.display = isMyTurn ? 'block' : 'none';
            document.getElementById('result-box').style.display = (game.showingResults && game.active) ? 'block' : 'none';
            document.getElementById('startBtn').style.display = (!game.active && players.length >= 2) ? 'block' : 'none';
            document.getElementById('status').innerText = isMyTurn ? "🔥 LƯỢT CỦA BẠN" : `Đợi: ${players[game.turn]?.name}`;

            // Danh sách người chơi
            document.getElementById('playerList').innerHTML = players.map((p, i) => `
                <div class="player-row ${game.turn === i && game.active ? 'active-turn' : ''} ${!p.online ? 'offline' : ''}">
                    <div style="display:flex; align-items:center">
                        ${!game.active ? `<div style="display:flex; flex-direction:column; margin-right:5px">
                            <button style="padding:2px; font-size:8px" onclick="movePlayer(${i},-1)">▲</button>
                            <button style="padding:2px; font-size:8px" onclick="movePlayer(${i},1)">▼</button>
                        </div>` : ''}
                        <span style="font-size:13px">${p.online ? '🟢' : '⚪'} ${p.name}</span>
                    </div>
                    <span style="font-size:16px; color:#fbbf24">
                        ${!game.active ? '🎲x5' : (p.alive ? (game.showingResults ? p.dice.map(d => diceIcons[d]).join('') : '🎲'.repeat(p.count)) : '❌')}
                    </span>
                </div>
            `).join('');

            document.getElementById('logs').innerHTML = game.logs.slice().reverse().map(l => `<div>${l}</div>`).join('');
        });
    </script>
</body>
</html>
