<!DOCTYPE html>
<html>
<head>
    <title>Perudo Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <style>
        :root { --primary: #2196F3; --success: #4CAF50; --danger: #f44336; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        .dice-set { font-size: 40px; color: #fbbf24; letter-spacing: 4px; margin: 10px 0; min-height: 48px; }
        .bid-val { font-size: 32px; font-weight: bold; color: var(--primary); margin: 10px 0; }
        
        .player-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #334155; }
        .player-row.active-turn { background: #1e3a8a; border-radius: 10px; border-bottom: none; }
        .order-btns button { padding: 4px 8px; font-size: 10px; background: #334155; margin-left: 2px; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; font-size: 18px; width: 80%; }
        button { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-main { background: var(--primary); color: white; width: 100%; }
        .btn-liar { background: var(--danger); color: white; grid-column: span 2; }
        .btn-next { background: var(--success); color: white; width: 100%; font-size: 18px; }
        
        #logs { font-size: 12px; color: #94a3b8; height: 100px; overflow-y: auto; text-align: left; }
        .dice-small { font-size: 18px; color: #fbbf24; }
    </style>
</head>
<body>
    <div id="login">
        <div class="card">
            <h2>🎲 PERUDO PRO</h2>
            <input type="text" id="nick" placeholder="Nhập tên..." style="width: 80%; margin-bottom: 15px;">
            <button onclick="join()" class="btn-main">VÀO PHÒNG</button>
        </div>
    </div>

    <div id="room" style="display:none">
        <div class="card">
            <small style="color: #94a3b8;">Xúc xắc của bạn</small>
            <div id="myDice" class="dice-set"></div>
        </div>

        <div class="card">
            <div id="status" style="font-weight: bold; margin-bottom: 5px;"></div>
            <div id="currentBid" class="bid-val">---</div>
            
            <div id="bid-area" style="display:none">
                <div class="controls">
                    <div><small>Số lượng</small><br><input type="number" id="bc" value="1"></div>
                    <div><small>Mặt</small><br><input type="number" id="bf" value="2" min="1" max="6"></div>
                    <button onclick="bid()" class="btn-main" style="grid-column: span 2; background: var(--success);">ĐẶT THẦU</button>
                    <button onclick="liar()" class="btn-liar">HÔ LIAR!</button>
                </div>
            </div>

            <div id="result-area" style="display:none">
                <button onclick="nextRound()" class="btn-next">SẴN SÀNG VÒNG TIẾP ⮕</button>
            </div>

            <button id="startBtn" onclick="start()" class="btn-main" style="display:none; margin-top:10px;">BẮT ĐẦU GAME</button>
        </div>

        <div class="card" style="padding: 10px;">
            <div id="playerList"></div>
        </div>

        <div class="card" id="logs"></div>
        <button onclick="resetRoom()" style="background:none; color:#475569; font-size:10px; width:100%">RESET SERVER</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const diceIcons = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
        let myNick = localStorage.getItem('p_name') || "";

        function join() {
            myNick = document.getElementById('nick').value;
            if(!myNick) return;
            localStorage.setItem('p_name', myNick);
            socket.emit('join', myNick);
            document.getElementById('login').style.display = 'none';
            document.getElementById('room').style.display = 'block';
        }

        function start() { socket.emit('start'); }
        function bid() { socket.emit('bid', { count: parseInt(bc.value), face: parseInt(bf.value) }); }
        function liar() { socket.emit('liar'); }
        function nextRound() { socket.emit('nextRound'); }
        function resetRoom() { if(confirm("Xóa hết người chơi?")) socket.emit('resetRoom'); }
        function movePlayer(index, direction) { socket.emit('movePlayer', {index, direction}); }

        socket.on('update', ({players, game, me}) => {
            const meObj = players.find(p => p.name === myNick);
            if (meObj) document.getElementById('myDice').innerText = meObj.dice.map(d => diceIcons[d] || d).join(' ');

            document.getElementById('currentBid').innerText = game.bid.count > 0 ? `${game.bid.count} con [${game.bid.face === 1 ? 'Ace' : game.bid.face}]` : "CHƯA CÓ THẦU";
            
            const isMyTurn = game.active && !game.showingResults && players[game.turn]?.name === myNick;
            document.getElementById('bid-area').style.display = isMyTurn ? 'block' : 'none';
            document.getElementById('result-area').style.display = game.showingResults ? 'block' : 'none';
            document.getElementById('startBtn').style.display = (!game.active && players.length >= 2) ? 'block' : 'none';

            let statusColor = isMyTurn ? "#4CAF50" : "#94a3b8";
            if (game.showingResults) statusColor = "#fbbf24";
            document.getElementById('status').style.color = statusColor;
            document.getElementById('status').innerText = game.showingResults ? "KẾT QUẢ VÒNG" : (isMyTurn ? "🔥 LƯỢT CỦA BẠN" : `Lượt của: ${players[game.turn]?.name || '...'}`);

            document.getElementById('playerList').innerHTML = players.map((p, i) => `
                <div class="player-row ${game.turn === i && game.active ? 'active-turn' : ''}">
                    <div style="display:flex; align-items:center">
                        ${!game.active ? `
                            <div class="order-btns">
                                <button onclick="movePlayer(${i}, -1)">▲</button>
                                <button onclick="movePlayer(${i}, 1)">▼</button>
                            </div>
                        ` : ''}
                        <span style="margin-left:10px; color:${p.alive?'#fff':'#64748b'}">${p.name} ${p.name===myNick?'(Bạn)':''}</span>
                    </div>
                    <div class="dice-small">
                        ${p.alive ? (game.showingResults || !game.active ? p.dice.map(d => diceIcons[d]).join(' ') : '🎲'.repeat(p.count)) : '❌ LOẠI'}
                    </div>
                </div>
            `).join('');

            document.getElementById('logs').innerHTML = game.logs.slice().reverse().map(l => `<div>${l}</div>`).join('');
        });

        if (myNick) { document.getElementById('nick').value = myNick; join(); }
    </script>
</body>
</html>
