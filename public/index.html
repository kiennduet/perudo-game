<!DOCTYPE html>
<html>
<head>

<script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const diceIcons = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
        let myName = "";

        if (localStorage.getItem('p_user')) {
            document.getElementById('user').value = localStorage.getItem('p_user');
            document.getElementById('pass').value = localStorage.getItem('p_pass');
        }

        function login() {
            const username = document.getElementById('user').value.trim();
            const password = document.getElementById('pass').value.trim();
            if (!username || !password) return alert("Nhập đủ user/pass");
            socket.emit('login', { username, password });
        }

        socket.on('loginSuccess', (name) => {
            myName = name;
            localStorage.setItem('p_user', name);
            localStorage.setItem('p_pass', document.getElementById('pass').value);
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('game-box').style.display = 'block';
        });

        socket.on('err', (m) => alert(m));
        socket.on('reloadAll', () => { localStorage.clear(); location.reload(); });

        function start() { socket.emit('start'); }
        function bid() { socket.emit('bid', { count: parseInt(bc.value), face: parseInt(bf.value) }); }
        function liar() { socket.emit('liar'); }
        function nextRound() { socket.emit('nextRound'); }
        function resetRoom() { if(confirm("Xóa hết dữ liệu?")) socket.emit('resetRoom'); }
        function movePlayer(index, direction) { socket.emit('movePlayer', { index, direction }); }

        socket.on('update', ({players, game, me}) => {
            const meObj = players.find(p => p.name === myName);
            const myDiceEl = document.getElementById('myDice');
            
            // LOGIC HIỂN THỊ XÚC XẮC CỦA BẠN
            if (!game.active) {
                myDiceEl.innerText = "SẴN SÀNG (5 🎲)";
                myDiceEl.style.fontSize = "24px";
                myDiceEl.style.color = "#94a3b8";
            } else {
                myDiceEl.style.fontSize = "42px";
                myDiceEl.style.color = "#fbbf24";
                if (meObj && meObj.alive) {
                    myDiceEl.innerText = meObj.dice.map(d => diceIcons[d]).join(' ');
                } else {
                    myDiceEl.innerText = "BỊ LOẠI";
                    myDiceEl.style.color = "#ef4444";
                }
            }

            // HIỂN THỊ MỨC THẦU
            const bidEl = document.getElementById('currentBid');
            if (!game.active) {
                bidEl.innerText = "CHỜ BẮT ĐẦU";
                bidEl.style.color = "#475569";
            } else {
                bidEl.innerText = game.bid.count > 0 ? `${game.bid.count} con [${game.bid.face === 1 ? 'Ace' : game.bid.face}]` : "CHỜ THẦU";
                bidEl.style.color = "#3b82f6";
            }
            
            // TRẠNG THÁI NÚT BẤM
            const isMyTurn = game.active && !game.showingResults && players[game.turn]?.name === myName;
            document.getElementById('actions').style.display = isMyTurn ? 'block' : 'none';
            document.getElementById('result-box').style.display = (game.showingResults && game.active) ? 'block' : 'none';
            
            // Hiện nút Bắt đầu khi có >= 2 người và game chưa chạy
            document.getElementById('startBtn').style.display = (!game.active && players.length >= 2) ? 'block' : 'none';

            // DÒNG TRẠNG THÁI (STATUS)
            const statusEl = document.getElementById('status');
            if (!game.active) {
                statusEl.innerText = players.length < 2 ? "ĐANG ĐỢI NGƯỜI CHƠI KHÁC..." : "PHÒNG CHỜ";
                statusEl.style.color = "#94a3b8";
            } else if (game.showingResults) {
                statusEl.innerText = "KẾT QUẢ VÒNG";
                statusEl.style.color = "#fbbf24";
            } else {
                statusEl.innerText = isMyTurn ? "🔥 LƯỢT CỦA BẠN" : `Đang đợi: ${players[game.turn]?.name || '...'}`;
                statusEl.style.color = isMyTurn ? "#10b981" : "#94a3b8";
            }

            // DANH SÁCH NGƯỜI CHƠI
            document.getElementById('playerList').innerHTML = players.map((p, i) => `
                <div class="player-row ${game.turn === i && game.active ? 'active-turn' : ''} ${!p.online ? 'offline' : ''}">
                    <div style="display:flex; align-items:center">
                        ${!game.active ? `<div style="display:flex; flex-direction:column; margin-right:8px">
                            <button class="order-btn" onclick="movePlayer(${i}, -1)">▲</button>
                            <button class="order-btn" onclick="movePlayer(${i}, 1)">▼</button>
                        </div>` : ''}
                        <span>${p.online ? '🟢' : '⚪'} ${p.name} ${p.name === myName ? '<b>(BẠN)</b>' : ''}</span>
                    </div>
                    <span style="font-size:20px; color:#fbbf24">
                        ${!game.active ? '🎲x5' : (p.alive ? (game.showingResults ? p.dice.map(d => diceIcons[d]).join('') : '🎲'.repeat(p.count)) : '❌')}
                    </span>
                </div>
            `).join('');

            document.getElementById('logs').innerHTML = game.logs.slice().reverse().map(l => `<div>${l}</div>`).join('');
        });
    </script>


</body>
</html>
